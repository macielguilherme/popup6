<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação de Saída - DocZ</title>

    <style>
        /* ===== RESET GLOBAL ===== */
        html, body {
            margin: 0; padding: 0; border: 0;
            background: #fafafa;
            font-family: Arial, Helvetica, sans-serif;
            color: #595959;
            line-height: 20px;
        }

        /* ===== MODAL ===== */
        #popup-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }

        .ui-dialog {
            background: #585858;
            padding: 5px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            width: 500px;
            max-width: 95%;
        }

        .ui-dialog-titlebar {
            background: url("https://docz.sosdocs.com.br/Docz/app/images/backgrounds/titleBg.png") repeat-x 0 0;
            border-bottom: 1px solid #cdcdcd;
            height: 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .ui-dialog-title {
            font-weight: bold;
            color: #595959;
            font-size: 12px;
        }

        .ui-dialog-content {
            background-color: #fafafa;
            padding: 20px;
        }

        /* ===== ELEMENTOS INTERNOS ===== */
        .message-box {
            margin-bottom: 20px;
            font-size: 14px;
            color: #595959;
            text-align: left;
            padding: 10px 5px;
        }

        .message-box p {
            margin: 0;
            line-height: 1.5;
        }

        .aviso-pendencia {
            margin-top: 10px !important;
            font-weight: bold;
        }

        /* ===== BOTÕES ===== */
        .button-wrapper {
            text-align: right;
            border-top: 1px double #ccc;
            padding-top: 15px;
        }

        .button {
            font-size: 11px; 
            font-weight: bold;
            background-image: url("https://docz.sosdocs.com.br/Docz/app/images/ui/usualButtons.png");
            background-repeat: repeat-x;
            text-transform: uppercase;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 2px;
            color: #fff;
            display: inline-block;
            border: none;
            font-family: Arial, Helvetica, sans-serif;
            margin-left: 8px;
        }

        /* Cores conforme padrão DocZ */
        .greenB { background-position: 0 -425px; border: 1px solid #7ca82a; }
        .redB { background-position: 0 -170px; border: 1px solid #9f352b; }

        /* Esconder o fechar lateral para forçar decisão */
        .no-close {
            visibility: hidden;
        }
    </style>
</head>

<body>

<div id="popup-backdrop">

    <div id="modal-confirmacao" class="ui-dialog">
        <div class="ui-dialog-titlebar">
            <span class="ui-dialog-title">Assinatura não concluída</span>
            <span class="no-close">✖</span>
        </div>

        <div class="ui-dialog-content">
            <div class="message-box">
                <p>A assinatura deste documento ainda não foi finalizada.</p>
                <p class="aviso-pendencia">Deseja realmente sair sem assinar?</p>
            </div>

            <div class="button-wrapper">
                <button class="button redB" onclick="salvarComoPendencia()">Salvar como pendência</button>
                <button class="button greenB" onclick="continuarAssinando()">Continuar assinatura</button>
            </div>
        </div>
    </div>

</div>

<script>
    function salvarComoPendencia() {
        // Regra: Registra a pendência e permite a saída
        console.log("Sistema: Pendência de assinatura registrada.");
        alert("A pendência foi registrada. Você pode sair do fluxo agora.");
        fecharPopup();
    }

    function continuarAssinando() {
        // Regra: Fecha este popup e volta para a assinatura
        console.log("Sistema: Retornando ao popup de assinatura.");
        fecharPopup();
    }

    function fecharPopup() {
        document.getElementById("popup-backdrop").style.display = "none";
    }
</script>

</body>
</html>
